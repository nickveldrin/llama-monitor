name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: [self-hosted, linux, proxmox]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-zigbuild
        run: |
          source ~/.cargo/env || true
          cargo install cargo-zigbuild --locked

      - name: Build Linux x86_64
        run: |
          source ~/.cargo/env
          cargo zigbuild --release --target x86_64-unknown-linux-gnu
          cp target/x86_64-unknown-linux-gnu/release/llama-monitor ./llama-monitor-linux-x86_64
          chmod +x ./llama-monitor-linux-x86_64

      - name: Build Linux ARM64
        run: |
          source ~/.cargo/env
          cargo zigbuild --release --target aarch64-unknown-linux-gnu
          cp target/aarch64-unknown-linux-gnu/release/llama-monitor ./llama-monitor-linux-aarch64
          chmod +x ./llama-monitor-linux-aarch64

      - name: Build macOS ARM64
        run: |
          source ~/.cargo/env
          cargo zigbuild --release --target aarch64-apple-darwin
          cp target/aarch64-apple-darwin/release/llama-monitor ./llama-monitor-macos-arm64
          chmod +x ./llama-monitor-macos-arm64

      - name: Build Windows x86_64
        run: |
          source ~/.cargo/env
          cargo zigbuild --release --target x86_64-pc-windows-gnu
          cp target/x86_64-pc-windows-gnu/release/llama-monitor.exe ./llama-monitor-windows-x86_64.exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-binaries
          path: |
            llama-monitor-linux-x86_64
            llama-monitor-linux-aarch64
            llama-monitor-macos-arm64
            llama-monitor-windows-x86_64.exe

  release:
    needs: build
    runs-on: [self-hosted, linux, proxmox]
    steps:
      - uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-binaries
          path: .

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          files: |
            llama-monitor-linux-x86_64
            llama-monitor-linux-aarch64
            llama-monitor-macos-arm64
            llama-monitor-windows-x86_64.exe
