name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    if: github.event.pull_request.draft == false && contains(github.event.pull_request.labels.*.name, 'ready-to-test')
    runs-on: [self-hosted, linux, proxmox]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: git diff --check
      - run: cargo fmt -- --check
      - run: cargo clippy -- -D warnings
      - run: cargo test
      - run: cargo build --release

  ui:
    needs: check
    if: github.event.pull_request.draft == false && contains(github.event.pull_request.labels.*.name, 'ready-to-test')
    runs-on: [self-hosted, linux, proxmox]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: tests/ui/package-lock.json
      - name: Check static JavaScript syntax
        run: node --check static/app.js
      - name: Install UI test dependencies
        working-directory: tests/ui
        run: npm ci
      - name: Install Playwright Chromium
        working-directory: tests/ui
        run: npx playwright install chromium
      - name: Start UI smoke server
        run: |
          ./target/release/llama-monitor --headless --port 7778 > "$RUNNER_TEMP/llama-monitor-ui.log" 2>&1 &
          echo $! > "$RUNNER_TEMP/llama-monitor-ui.pid"
          for i in {1..30}; do
            curl -fsS http://127.0.0.1:7778 >/dev/null && exit 0
            sleep 1
          done
          cat "$RUNNER_TEMP/llama-monitor-ui.log"
          exit 1
      - name: Run Playwright UI tests
        working-directory: tests/ui
        env:
          LLAMA_MONITOR_UI_URL: http://127.0.0.1:7778
        run: npm test
      - name: Stop UI smoke server
        if: always()
        run: |
          if [ -f "$RUNNER_TEMP/llama-monitor-ui.pid" ]; then
            kill "$(cat "$RUNNER_TEMP/llama-monitor-ui.pid")" || true
          fi
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/ui/playwright-report/
          if-no-files-found: ignore

  release-smoke:
    if: github.event.pull_request.draft == false && contains(github.event.pull_request.labels.*.name, 'ready-to-test')
    runs-on: [self-hosted, linux, proxmox]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu,aarch64-unknown-linux-gnu,x86_64-pc-windows-gnu,aarch64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - name: Preflight release toolchain
        run: bash scripts/release-preflight.sh
      - name: Smoke build release targets
        run: bash scripts/build-release-targets.sh
