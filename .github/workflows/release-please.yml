name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    runs-on: [self-hosted, linux, proxmox]
    steps:
      - uses: googleapis/release-please-action@v4.4.1
        with:
          release-type: rust
          token: ${{ secrets.RELEASE_PAT }}
          config-file: .github/release-please/config.json5
