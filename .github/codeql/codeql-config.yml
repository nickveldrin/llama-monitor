# CodeQL configuration to suppress known false positives

paths-ignore:
  # Config file paths set at application startup, not runtime user input
  - src/config.rs
  - src/presets/mod.rs
  - src/state.rs
  - src/gpu/env.rs
  - src/agent.rs
  - src/models/mod.rs

query-filters:
  # Suppress path-injection for config file operations (startup-time paths, not runtime user input)
  - id: rust/path-injection
    paths:
      - src/config.rs
      - src/presets/mod.rs
      - src/state.rs
      - src/gpu/env.rs
      - src/agent.rs
      - src/models/mod.rs
    reason: "Config file paths are set at application startup from ~/.config/llama-monitor/, not from runtime user input. These are safe file operations."

  # Suppress XSS for data from backend API (llama.cpp), not user input
  - id: js/xss
    paths:
      - static/app.js
      - static/compact.html
    reason: "Data comes from backend API (llama.cpp metrics), not from user input. The backend is trusted."

  # Suppress path-injection for temp file operations
  - id: cs/path-injection
    paths:
      - sensor_bridge/Program.cs
    reason: "Path.GetTempPath() is a safe system call that returns the OS temp directory, not user input."
